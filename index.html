<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dialog Cinta Fest Vol.5</title>
<style>
body{margin:0;font-family:Arial;background:#f3f3f3;padding-bottom:90px}.nav{background:#fff;padding:16px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:42px;font-weight:900}
.banner img{width:100%;display:block}.card{background:#fff;margin:15px;border-radius:18px;padding:18px}.row{display:flex;justify-content:space-between;align-items:center}
button{padding:8px 12px}.buy{position:fixed;left:10px;right:10px;bottom:10px;background:#ff7a00;color:#fff;border:none;padding:18px;border-radius:14px;font-weight:bold}
</style></head><body>
<div class='nav'><div class='logo'>joytix.</div><div>⌕ ☰</div></div>
<div class='banner'><img src='176.jpg'></div>
<div class='card'><div class='row'><b>Festival Rp85.000</b><div><button onclick="c('f',-1)">-</button> <span id='f'>0</span> <button onclick="c('f',1)">+</button></div></div></div>
<div class='card'><div class='row'><b>VIP Rp110.000</b><div><button onclick="c('v',-1)">-</button> <span id='v'>0</span> <button onclick="c('v',1)">+</button></div></div></div>
<button class='buy' onclick='go()'>LANJUTKAN PEMBELIAN</button>
<script>
function c(id,n){let e=document.getElementById(id);let x=Math.max(0,Math.min(5,+e.innerText+n));e.innerText=x;}
function go(){localStorage.setItem('festival',f.innerText);localStorage.setItem('vip',v.innerText);location='from.html';}
</script></body></html>
